services:
  api:
      build: .
      container_name: my-api
      ports:
        - "${LISTENING_PORT}:5000"
      environment:
        DB_HOST: db
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASS}
        DB_NAME: ${DB_NAME}
      volumes:
        - .:/app
        - /app/node_modules
      command: pnpm dev
      depends_on:
        db:
          condition: service_healthy

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data: